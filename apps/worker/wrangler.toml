name = "line-crm-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# API_KEY is set via `wrangler secret put API_KEY`
# Do NOT hardcode secrets here

[[d1_databases]]
binding = "DB"
database_name = "line-crm"
database_id = "31021469-0729-4045-92a8-9f17f33737b2"

[vars]
AI_AUTO_REPLY_ENABLED = "true"
AI_MODEL = "claude-sonnet-4-6"

[triggers]
crons = ["*/5 * * * *"]
